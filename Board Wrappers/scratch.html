	<tbody>
		<tr>
			<td><b>CODE</b></td>
		</tr>
		<tr>
			<td id="CODE">
				<!--ec1-->[ph1]text here[/ph1]<br />[ph2]text here[/ph2]<br />[sh1]text here[/sh1]<br />[sh2]text here[/sh2]<br />[th1]text
				here[/th1]<br />[th2]text here[/th2]<!--c2-->
			</td>
		</tr>
	</tbody>
</table>

<script>
	$(document).ready(function () {
		if ($('#CODE-WRAP').length > 0) {
			$('<button>').text('Click to Highlight Code').insertAfter('b:contains("CODE")');
			$('button').click(function () {
				var codeText = $('#CODE').text();
				var range = document.createRange();
				range.selectNodeContents($('#CODE')[0]);
				var selection = window.getSelection();
				selection.removeAllRanges();
				selection.addRange(range);
			});
		}
	});
</script>
